services:
  nginx:
    image: nginx:alpine
    container_name: ns-nginx
    ports:
      - "${NSR_WEB_PORT:-9191}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: always

  backend:
    build: .
    container_name: ns-center
    ports:
      - "${NSR_AGENT_PORT:-9192}:5000"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=networkstatus
      - INFLUXDB_BUCKET_RAW=raw
      - INFLUXDB_BUCKET_1M=agg_1m
      - INFLUXDB_BUCKET_1H=agg_1h
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./data:/app/data
      - frontend_dist:/app/web/dist
    depends_on:
      - influxdb
    restart: always

  influxdb:
    image: influxdb:2.7
    container_name: ns-influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=networkstatus
      - DOCKER_INFLUXDB_INIT_BUCKET=raw
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: always

volumes:
  influxdb_data:
  frontend_dist:
